<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>눈밭의 의주 관찰소</title>

<style>
html,body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    font-family:sans-serif;
}

body{
    background:
        radial-gradient(circle at top,#ffffff,#eef6ff 60%,#dfefff);
}

/* 정보창 */
#panel{
    position:fixed;
    top:15px;
    left:15px;
    padding:14px 18px;
    background:rgba(255,255,255,.75);
    backdrop-filter:blur(8px);
    border-radius:16px;
    z-index:1000;
}

#panel h3{
    margin:0 0 8px 0;
}

/* 의주 */
#euiju{
    position:absolute;
    width:140px;
    user-select:none;
    cursor:grab;
    z-index:100;
}

/* 발자국 */
.footprint{
    position:absolute;
    color:#bfc8d8;
    font-size:16px;
    pointer-events:none;
    opacity:.8;
    animation:fade 8s linear forwards;
}

@keyframes fade{
    to{
        opacity:0;
    }
}

/* 말풍선 */
#bubble{
    position:absolute;
    padding:8px 12px;
    background:white;
    border-radius:12px;
    display:none;
    z-index:101;
    box-shadow:0 2px 10px rgba(0,0,0,.08);
}

/* 눈 */
.snow{
    position:absolute;
    color:white;
    pointer-events:none;
    opacity:.9;
}

@keyframes waddle{
    0%{ transform: translateY(0px) rotate(-3deg); }
    25%{ transform: translateY(-4px) rotate(-1deg); }
    50%{ transform: translateY(0px) rotate(3deg); }
    75%{ transform: translateY(-4px) rotate(1deg); }
    100%{ transform: translateY(0px) rotate(-3deg); }
}

</style>
</head>
<body>

<div id="panel">
    <h3>❄ 눈밭의 의주 관찰소</h3>
    <div>걸은 거리: <span id="distance">0</span> m</div>
    <div>드래그 당함: <span id="dragCount">0</span> 회</div>
</div>

<div id="bubble">...</div>

<img id="euiju" src="euiju.png" draggable="false">

<script>

const euiju = document.getElementById("euiju");
const bubble = document.getElementById("bubble");
euiju.ondragstart = () => false;

let x = window.innerWidth/2;
let y = window.innerHeight/2;

let vx = 0.7;
let vy = 0.5;

let dragging = false;
let sleeping = false;

let totalDistance = 0;
let dragCount = 0;

let targetX = x;
let targetY = y;
let mouseSpeed = 0;
let prevTargetX = x;
let prevTargetY = y;

const distanceText = document.getElementById("distance");
const dragText = document.getElementById("dragCount");

/* 눈 생성 */
for(let i=0;i<120;i++){

    const snow=document.createElement("div");
    snow.className="snow";
    snow.innerHTML="❄";

    snow.style.fontSize=
        (10+Math.random()*18)+"px";

    snow.style.left=
        Math.random()*window.innerWidth+"px";

    snow.style.top=
        Math.random()*window.innerHeight+"px";

    document.body.appendChild(snow);

    let speed = 0.4 + Math.random() * 0.8;

    setInterval(()=>{

        let y=parseFloat(snow.style.top);

        y+=speed;

        if(y>window.innerHeight+20){
            y=-20;
        }

        snow.style.top=y+"px";

    },16);
}

/* 발자국 */
let stepSide = false;

function createFootprint(){

    const fp = document.createElement("div");

    fp.className = "footprint";
    fp.innerHTML = "•";

    const side = stepSide ? -18 : 18;

    fp.style.left = (x + 60 + side) + "px";
    fp.style.top = (y + 105) + "px";

    stepSide = !stepSide;

    document.body.appendChild(fp);

    setTimeout(()=>{
        fp.remove();
    },8000);
}

/* 멍때리기 */
function idleMoment(){

    if(dragging) return;

    sleeping=true;

    bubble.innerText="...";
    bubble.style.display="block";

    setTimeout(()=>{
        bubble.style.display="none";
        sleeping=false;
    },2500);
}

setInterval(()=>{
    if(Math.random()<0.4){
        idleMoment();
    }
},12000);

/* 움직임 */
let footprintTimer=0;

function update(){

    if(dragging){
        x += (targetX - x) * 0.18;
        y += (targetY - y) * 0.18;
    }

    if(!dragging && !sleeping){

        const oldX=x;
        const oldY=y;

        x+=vx;
        y+=vy;

        if(x<0 || x>window.innerWidth-140){

            vx*=-1;

            euiju.style.transform=
                vx>0 ? "scaleX(1)" : "scaleX(-1)";
        }

        if(y<0 || y>window.innerHeight-140){
            vy*=-1;
        }

        if(Math.random()<0.003){

            vx=(Math.random()-0.5)*2;
            vy=(Math.random()-0.5)*2;

            euiju.style.transform=
                vx>0 ? "scaleX(1)" : "scaleX(-1)";
        }

        totalDistance += Math.hypot(
            x-oldX,
            y-oldY
        )/40;

        distanceText.textContent=
            Math.floor(totalDistance);

        footprintTimer++;

        if(footprintTimer>60){

    createFootprint();
    footprintTimer=0;
}
    }

    euiju.style.left=x+"px";
    euiju.style.top=y+"px";

    if(!dragging && !sleeping){
        const wobble = Math.sin(Date.now()/120) * 3;
        const bounce = Math.abs(Math.sin(Date.now()/120)) * -4;
        euiju.style.transform =
            `${vx>0 ? "scaleX(1)" : "scaleX(-1)"} translateY(${bounce}px) rotate(${wobble}deg)`;
    } else {
        const dangle = Math.sin(Date.now()/100) * 15;
const speedTilt = Math.min(35, mouseSpeed * 0.7);

euiju.style.transform =
`${vx>0 ? "scaleX(1)" : "scaleX(-1)"} rotate(${dangle + speedTilt}deg)`;
    }

    bubble.style.left=(x+60)+"px";
    bubble.style.top=(y-50)+"px";

    requestAnimationFrame(update);
}

update();

/* 드래그 */

euiju.addEventListener("mousedown",(e)=>{

    dragging=true;
    euiju.style.cursor="grabbing";
    euiju.style.scale="1.05";

    dragCount++;
    dragText.textContent=dragCount;

    bubble.innerText="?!";
    bubble.style.display="block";

    const offsetX=e.clientX-x;
    const offsetY=e.clientY-y;

    function move(ev){

    if(!dragging) return;

    targetX = ev.clientX - offsetX;
    targetY = ev.clientY - offsetY;

    mouseSpeed = Math.hypot(
        targetX - prevTargetX,
        targetY - prevTargetY
    );

    prevTargetX = targetX;
    prevTargetY = targetY;
}

    function up(){

        dragging=false;
        euiju.style.cursor="grab";
        euiju.style.scale="1";

        bubble.innerText="...";
        setTimeout(()=>{
            bubble.style.display="none";
        },1500);

        document.removeEventListener(
            "mousemove",
            move
        );

        document.removeEventListener(
            "mouseup",
            up
        );
    }

    document.addEventListener(
        "mousemove",
        move
    );

    document.addEventListener(
        "mouseup",
        up
    );
});

</script>

</body>
</html>
